<!-- ШАГ 3: Вопросы для визуализации -->
<div class="wizard-step" id="wizardStep2">
    <div class="wizard-card">
        <div class="wizard-step-header">
            <span class="wizard-step-num">3</span>
            <h4 class="wizard-step-title">Выбор вопросов для анализа</h4>
            <span class="step-help-icon ms-auto" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Отметьте вопросы, которые войдут в итоговый отчёт. При нескольких файлах выберите один, из которого будут браться вопросы."><i class="fa-regular fa-circle-question"></i></span>
        </div>
        <div id="fileSelectContainer" class="mb-2" style="display:none">
            <label class="form-label small mb-1" for="fileSelectStep3">Выбрать вопросы из файла:</label>
            <select class="form-select form-select-sm" id="fileSelectStep3"></select>
        </div>
        <div id="selectAllQuestionsRow" class="d-flex justify-content-between align-items-center pb-2 flex-wrap gap-2">
            <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="selectAllQuestions">
                <label class="form-check-label fw-bold" for="selectAllQuestions">
                    <i class="fa-solid fa-check-double me-1"></i>Все вопросы
                </label>
            </div>
            <div class="form-check form-switch mb-0 d-flex align-items-center gap-1">
                <input class="form-check-input me-2 cursor-pointer" type="checkbox" id="showHiddenCols">
                <label class="form-check-label text-muted cursor-pointer" for="showHiddenCols">
                    <i class="fa-solid fa-eye me-1"></i>Скрытые
                </label>
                <i class="fa-regular fa-circle-question text-muted help-icon-sm"
                   data-bs-toggle="tooltip"
                   data-bs-placement="top"
                   title="Служебные столбцы, скрытые по умолчанию: идентификаторы, метки времени и прочие технические поля, которые не являются вопросами анкеты"></i>
            </div>
        </div>
        <div class="">
            <div class="input-group input-group-sm">
                <input type="text" class="form-control" id="questionsSearchInput" placeholder="Поиск вопроса...">
                <button class="btn btn-outline-secondary" type="button" id="questionsSearchClear" tabindex="-1" title="Очистить поиск">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>
        <div id="allQuestionsList" class="scrollable-box questions-scroll pt-0 pb-0 pr-0 pl-1"></div>
    </div>
</div>
