<!-- Нижняя панель: кнопки навигации + индикатор шагов -->
<div class="wizard-nav-bar">
    <button type="button" class="btn btn-outline-secondary wizard-back-btn invisible" id="navBackBtn">
        <i class="fa-solid fa-arrow-left me-2"></i>Назад
    </button>

    <div class="step-dots">
        <span class="step-dot active" data-step="0"></span>
        <span class="step-dot" data-step="1"></span>
        <span class="step-dot" data-step="2"></span>
        <span class="step-dot" data-step="3"></span>
        <span class="step-dot" data-step="4"></span>
        <span class="step-dot" data-step="5"></span>
    </div>

    <div class="d-flex align-items-center">
        <!-- Шаг 1: загрузка -->
        <div class="nav-step-fwd" data-fwd-step="0">
            <div class="d-flex align-items-center gap-2">
                <div class="spinner-border text-primary d-none spinner-app" id="uploadSpinner"></div>
                <button type="submit" form="uploadForm" class="btn btn-primary px-4 nav-fwd-btn" id="uploadBtn" disabled>
                    <i class="fa-solid fa-table-list me-1"></i>Выбрать листы <i class="fa-solid fa-arrow-right ms-2"></i>
                </button>
            </div>
        </div>
        <!-- Шаг 2: листы -->
        <div class="nav-step-fwd d-none" data-fwd-step="1">
            <div class="d-flex align-items-center gap-2">
                <div class="spinner-border text-primary d-none spinner-app" id="sheetSpinner"></div>
                <button type="submit" form="sheetForm" class="btn btn-primary px-4 nav-fwd-btn" id="processSheetsBtn" disabled>
                    <i class="fa-solid fa-list-check me-1"></i>Выбрать вопросы <i class="fa-solid fa-arrow-right ms-2"></i>
                </button>
            </div>
        </div>
        <!-- Шаг 3: вопросы -->
        <div class="nav-step-fwd d-none" data-fwd-step="2">
            <button type="button" class="btn btn-primary px-4 nav-fwd-btn" id="toStep4Btn" disabled>
                <i class="fa-solid fa-sliders me-1"></i>К настройке <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </div>
        <!-- Шаг 4: настройка -->
        <div class="nav-step-fwd d-none" data-fwd-step="3">
            <button type="button" class="btn btn-primary px-4 nav-fwd-btn" id="toStep5Btn" disabled>
                <i class="fa-solid fa-chart-line me-1"></i>К визуализации <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </div>
        <!-- Шаг 5: просмотр -->
        <div class="nav-step-fwd d-none" data-fwd-step="4">
            <button type="button" class="btn btn-primary px-4 nav-fwd-btn" id="toStep6Btn">
                <i class="fa-solid fa-robot me-1"></i>К ИИ-отчёту <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </div>
        <!-- Шаг 6: нет кнопки вперёд -->
        <div class="nav-step-fwd d-none" data-fwd-step="5"></div>
    </div>
</div>
